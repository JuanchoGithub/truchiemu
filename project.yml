name: TruchieEmu
options:
  bundleIdPrefix: com.truchiemu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15"
schemes:
  TruchieEmu:
    build:
      targets:
        TruchieEmu: all
        TruchieEmuTests: [test]
    test:
      targets:
        - TruchieEmuTests

targets:
  TruchieEmu:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    frameworks:
      - SwiftData

    info:
      path: TruchieEmu/Resources/Info.plist
      properties:
        CFBundleName: TruchieEmu
        CFBundleDisplayName: TruchieEmu
        CFBundleIdentifier: com.truchiemu.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSHumanReadableCopyright: "© 2026 TruchieEmu"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

    entitlements:
      path: TruchieEmu/Resources/TruchieEmu.entitlements

    settings:
      base:
        PRODUCT_NAME: TruchieEmu
        PRODUCT_BUNDLE_IDENTIFIER: com.truchiemu.app
        SWIFT_OBJC_BRIDGING_HEADER: TruchieEmu/Engine/TruchieEmu-Bridging-Header.h
        CLANG_ENABLE_OBJC_ARC: YES
        GCC_C_LANGUAGE_STANDARD: gnu17
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CLANG_CXX_LIBRARY: libc++
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ARCHS: "$(ARCHS_STANDARD)"
        CODE_SIGN_ENTITLEMENTS: TruchieEmu/Resources/TruchieEmu.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-framework Metal -framework MetalKit -framework GameController -framework AVFoundation -framework WebKit -framework OpenGL -framework SwiftData"

    sources:
      - path: TruchieEmu/App
        excludes:
          - "*.DS_Store"
      - path: TruchieEmu/Models
        type: group
        buildPhase: sources
      - path: TruchieEmu/Services
      - path: TruchieEmu/Engine
      - path: TruchieEmu/Shaders
        excludes:
          - "slang/**"
          - "internal/**"
          - "all_shaders.metal"
          - "CRTFilter_*.metal"
        buildPhase: sources
      - path: TruchieEmu/Views
      - path: TruchieEmu/Utilities
      # MAME ROM database (bundled JSON)
      - path: scripts/mame_lookup/mame_rom_data.json
        buildPhase: resources

    preBuildScripts: []

  TruchieEmuTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"

    frameworks:
      - SwiftData

    settings:
      base:
        PRODUCT_NAME: TruchieEmuTests
        PRODUCT_BUNDLE_IDENTIFIER: com.truchiemu.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

    sources:
      - path: TruchieEmuTests

    dependencies:
      - target: TruchieEmu

  TruchiCoreRunner:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"

    settings:
      base:
        PRODUCT_NAME: TruchiCoreRunner
        PRODUCT_BUNDLE_IDENTIFIER: com.truchiemu.runner
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: NO
        CLANG_ENABLE_OBJC_ARC: YES
        GCC_C_LANGUAGE_STANDARD: gnu17
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CLANG_CXX_LIBRARY: libc++
        OTHER_LDFLAGS: "-framework Metal -framework MetalKit -framework GameController -framework AVFoundation -framework OpenGL -framework IOSurface"

    sources:
      - path: TruchieEmu/Runner
      - path: TruchieEmu/Engine/libretro.h
      - path: TruchieEmu/Engine/CoreRunnerProtocol.h
      - path: TruchieEmu/Engine/SharedSurfaceManager.mm
      - path: TruchieEmu/Engine/SharedAudioBuffer.mm
      - path: TruchieEmu/Engine/SharedAudioBuffer.h
