name: TruchiEmu
options:
  bundleIdPrefix: com.TruchiEmu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15"
schemes:
  TruchiEmu:
    build:
      targets:
        TruchiEmu: all
        TruchiEmuTests: [test]
    test:
      targets:
        - TruchiEmuTests

targets:
  TruchiEmu:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    frameworks:
      - SwiftData

    info:
      path: TruchiEmu/Resources/Info.plist
      properties:
        CFBundleName: TruchiEmu
        CFBundleDisplayName: TruchiEmu
        CFBundleIdentifier: com.TruchiEmu.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSHumanReadableCopyright: "© 2026 TruchiEmu"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true


   NSDownloadsFolderUsageDescription: "TruchiEmu needs access to Downloads to load ROMs and save states."
   NSDocumentsFolderUsageDescription: "TruchiEmu needs access to Documents to store emulator saves and configuration."
    entitlements:
      path: TruchiEmu/Resources/TruchiEmu.entitlements

    settings:
      base:
        PRODUCT_NAME: TruchiEmu
        PRODUCT_BUNDLE_IDENTIFIER: com.TruchiEmu.app
        DEVELOPMENT_TEAM: "TruchiSoft" # ← Add your Team ID here to reduce permission prompts
        SWIFT_OBJC_BRIDGING_HEADER: TruchiEmu/Core/Engine/TruchiEmu-Bridging-Header.h
        CLANG_ENABLE_OBJC_ARC: YES
        GCC_C_LANGUAGE_STANDARD: gnu17
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CLANG_CXX_LIBRARY: libc++
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ARCHS: "$(ARCHS_STANDARD)"
        CODE_SIGN_ENTITLEMENTS: TruchiEmu/Resources/TruchiEmu.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-framework Metal -framework MetalKit -framework GameController -framework AVFoundation -framework WebKit -framework OpenGL -framework SwiftData"

    sources:
      - path: TruchiEmu/App
        excludes:
          - "*.DS_Store"
      - path: TruchiEmu/Core/Models
        type: group
      - path: TruchiEmu/Services
      - path: TruchiEmu/Core/Engine
        type: group
      - path: TruchiEmu/Core/Shaders
        excludes:
          - "slang/**"
          - "internal/**"
          - "all_shaders.metal"
        buildPhase: sources
      - path: TruchiEmu/Views
      - path: TruchiEmu/Shared
      - path: TruchiEmu/Features
      - path: TruchiEmu/Resources/Config
        buildPhase: resources
      - path: TruchiEmu/Resources/Data
        buildPhase: resources
      - path: TruchiEmu/Resources/EmulatorIcons
        buildPhase: resources
      - path: TruchiEmu/Resources/ThumbnailManifests
        buildPhase: resources
      - path: TruchiEmu/Resources/retroarch
        buildPhase: resources
      - path: TruchiEmu/Resources/System
        buildPhase: resources
      - path: scripts/mame_lookup/mame_rom_data.json
        buildPhase: resources

    preBuildScripts: []

  TruchiEmuTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"

    frameworks:
      - SwiftData

    settings:
      base:
        PRODUCT_NAME: TruchiEmuTests
        PRODUCT_BUNDLE_IDENTIFIER: com.TruchiEmu.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

    sources:
      - path: TruchiEmuTests

    dependencies:
      - target: TruchiEmu